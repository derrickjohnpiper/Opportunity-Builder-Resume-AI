region: oregon
services:
  # Python Backend (Web Service)
  - type: web
    name: opportunity-builder-api
    env: docker
    dockerContext: .
    dockerfilePath: backend/Dockerfile
    plan: free # Can be upgraded to starter for persistent disk
    envVars:
      - key: DATABASE_PATH
        value: /data/database.db
      - key: CORS_ORIGINS
        value: "*" # Update this to your frontend URL later for better security
      - key: GROK_API_KEY
        sync: false # Set this in the Render Dashboard
    disk:
      name: database-storage
      mountPath: /data
      sizeGB: 1

  # React Frontend (Static Site)
  - type: static
    name: opportunity-builder-app
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: opportunity-builder-api
          property: host
