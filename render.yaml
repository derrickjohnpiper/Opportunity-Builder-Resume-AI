region: oregon
services:
  # Single Docker service: Python backend + compiled React frontend
  # The Dockerfile is a multi-stage build that compiles the React app
  # and serves it directly from FastAPI — no separate static site needed.
  - type: web
    name: opportunity-builder-resume-ai
    env: docker
    dockerContext: .         # Repo root — needed so Docker can COPY frontend/
    dockerfilePath: Dockerfile  # Root-level multi-stage Dockerfile
    plan: free
    envVars:
      - key: DATABASE_PATH
        value: /app/database.db
      - key: CORS_ORIGINS
        value: "*"
      - key: GROK_API_KEY
        sync: false  # Set this secret in the Render Dashboard → Environment
