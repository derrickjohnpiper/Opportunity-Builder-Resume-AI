region: oregon
services:
  - type: web
    name: opportunity-builder-resume-ai
    env: python
    pythonVersion: "3.11.0"
    plan: free
    # Build: compile the React frontend first, then copy it where FastAPI expects it,
    # then install Python deps. Render runs this from the repo root.
    buildCommand: >
      npm install --prefix frontend &&
      npm run build --prefix frontend &&
      cp -r frontend/dist backend/static &&
      pip install -r requirements.txt &&
      sbase install chromedriver
    # Start: run uvicorn from inside the backend folder so local imports (db, services/) resolve
    startCommand: cd backend && uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_PATH
        value: /opt/render/project/src/backend/database.db
      - key: CORS_ORIGINS
        value: "*"
      - key: GROK_API_KEY
        sync: false  # Set this secret in Render Dashboard → Environment
